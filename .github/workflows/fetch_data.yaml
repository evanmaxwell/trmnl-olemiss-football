name: Fetch Ole Miss Football Data

on:
  schedule:
    # runs every 6 hours
    - cron: "0 */6 * * *"
  # allows you to run the fetch manually from the actions tab
  workflow_dispatch:

# forces github actions to execute runner tasks with node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24" # uses the latest node.js 24 runtime

      - name: Run Fetch Script
        run: node fetch_data.js

      - name: Commit and Push Updated Payload
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add payload.json
          git commit -m "auto-update schedule payload [skip ci]" || exit 0
          git push
